<section class="menu-panel administrador-panel">
  <div class="menu-header">
    <p class="menu-eyebrow">Centro de control</p>
    <h2>Administrador</h2>
    <p>Gestion centralizada de accesos, sistemas y configuracion operativa.</p>
  </div>

  <nav class="menu-nav" aria-label="Menu de Administracion">
    <a class="menu-link" *ngFor="let item of visibleItems" [routerLink]="item.route" routerLinkActive="active-link">
      <span class="menu-icon"><mat-icon>{{ item.icon }}</mat-icon></span>
      <span class="menu-copy">
        <span class="menu-title">{{ item.label }}</span>
        <span class="menu-text">{{ item.description }}</span>
      </span>
    </a>
  </nav>

  <div class="menu-footer">
    <div class="insight-card">
      <span class="insight-label">Atencion</span>
      <strong>Revisar permisos sensibles</strong>
      <p>Confirma perfiles administrativos antes de habilitar accesos a produccion.</p>
    </div>
  </div>
</section>
