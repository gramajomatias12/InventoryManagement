<h2 mat-dialog-title>
  <mat-icon>person_add</mat-icon>
  Nuevo Perfil
</h2>

<mat-dialog-content>
  <p class="dialog-hint">
    Se guardará como <strong>{{ preview }}</strong>
  </p>

  <form [formGroup]="form">
    <mat-form-field class="full-width" appearance="outline">
      <mat-label>Nombre del perfil</mat-label>
      <input matInput formControlName="dsPerfil" [placeholder]="data.prefijo + '_NOMBRE'">
      @if(form.get('dsPerfil')?.hasError('required')){
        <mat-error>El nombre es obligatorio</mat-error>
      }
      @if(form.get('dsPerfil')?.hasError('minlength')){
        <mat-error>Mínimo 2 caracteres</mat-error>
      }
    </mat-form-field>

    <mat-form-field class="full-width" appearance="outline">
      <mat-label>Descripción</mat-label>
      <input matInput formControlName="dsDescripcion" placeholder="Descripción del perfil">
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button (click)="cancelar()">Cancelar</button>
  <button mat-flat-button color="primary" (click)="guardar()" [disabled]="form.invalid">
    <mat-icon>save</mat-icon>
    Guardar
  </button>
</mat-dialog-actions>
