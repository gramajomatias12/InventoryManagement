<!--Archivo principal de la aplicación. Contiene la barra de navegación 
    y el router-outlet para mostrar las páginas. -->

<!-- También muestra una barra de progreso cuando loadingService.loading$ emite true. -->
@if(loadingService.loading$ | async){
<mat-progress-bar 
  mode="indeterminate" 
  color="accent" 
  style="position: fixed; top: 0; z-index: 1000;">
</mat-progress-bar>
}

<!-- Si hay un usuario logueado, muestra la barra de navegación con opciones según su rol. -->
@let user = (store.currentUser$ | async);
@if(user){
<mat-toolbar color="primary">
  <span>Inventory Management</span>
  
  <span class="spacer"></span> <button mat-button routerLink="/home">Inicio</button>

  @if(store.isAdmin$ | async){
  <button mat-button routerLink="/usuarios">Gestión</button>}
  
  <span style="font-size: 14px; margin: 0 15px;">Hola, {{ user.dsNombre }}</span>
  
  <button mat-icon-button (click)="store.logout()" matTooltip="Cerrar Sesión">
    <mat-icon>logout</mat-icon>
  </button>
</mat-toolbar>
}

<!-- El main tiene una clase no-padding si no hay usuario logueado, 
 para que el contenido ocupe toda la pantalla. -->
<main [class.no-padding]="!(store.currentUser$ | async)">
  <router-outlet></router-outlet>
</main>
