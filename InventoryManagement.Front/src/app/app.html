<!--Archivo principal de la aplicación. Contiene la barra de navegación 
    y el router-outlet para mostrar las páginas. -->

<!-- También muestra una barra de progreso cuando loadingService.loading$ emite true. -->
@if(loadingService.loading$ | async){
<mat-progress-bar 
  mode="indeterminate" 
  color="accent" 
  style="position: fixed; top: 0; z-index: 1000;">
</mat-progress-bar>
}

<!-- Si hay un usuario logueado, muestra la barra de navegación con opciones
  según su rol. -->

@let user = (store.currentUser$ | async);
@if(mostrarShell(user)){
<mat-toolbar class="app-toolbar">
  <div class="toolbar-accent"></div>

  <div class="brand-block">
    <span class="brand-kicker">Inventory Management</span>
    <span class="brand-title">{{ sistemaNombre }}</span>
    <span class="brand-subtitle">Modulo {{ sistemaPrefijo }}</span>
  </div>

  <span class="spacer"></span>

  <div class="toolbar-actions">
    <div class="user-panel">
      <span class="user-label">Sesion activa</span>
      <span class="welcome">{{ user?.dsNombre }}</span>
    </div>

    <button mat-icon-button class="logout-button" (click)="store.logout()" matTooltip="Cerrar Sesion">
      <mat-icon>logout</mat-icon>
    </button>
  </div>
</mat-toolbar>

<div class="app-shell">
  @if(menuActual){
  <aside class="side-menu">
    <ng-container *ngComponentOutlet="menuActual"></ng-container>
  </aside>
  }

  <main class="app-content">
    <router-outlet></router-outlet>
  </main>
</div>
} @else {
<main>
  <router-outlet></router-outlet>
</main>
}
